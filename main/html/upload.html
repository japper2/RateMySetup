<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Upload - RateMySetup</title>
    <link rel="stylesheet" href="../../style.css" />
  </head>
  <body>
    <header>
      <nav id="navbar"></nav>
    </header>
    <main>
      <form method="post" action="#" enctype="multipart/form-data">
        <label>
          Title:<br />
          <input type="text" name="title" placeholder="Setup title" />
        </label>
        <br />
        <label>
          Image:<br />
          <input type="file" name="image" />
        </label>
        <br />
        <label>
          Description:<br />
          <textarea
            name="description"
            rows="4"
            cols="40"
            placeholder="Describe your setup"
          ></textarea>
        </label>
        <br />
        <button type="submit">Upload</button>
      </form>
    </main>
    <footer>
      <small>&copy; RateMySetup</small>
    </footer>
    <script src="../js/nav.js"></script>
  </body>
</html>
